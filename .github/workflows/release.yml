name: Build and release PRG

# Builds all three Connect IQ projects (UtilityFace, WaveDetector, StepSync)
# with the real Connect IQ SDK, plus the StepSync Arduino receiver sketch,
# on every push to main that touches any of their build inputs -- and, only
# if every build succeeds, publishes all four artifacts as GitHub Release
# assets. See REVERSE_ENGINEERING_A_PRG.md for background on the .PRG format
# and the <8-hex-digit-app-id>.PRG naming convention.
on:
  push:
    branches: [main]
    paths:
      - "UtilityFace/source/**"
      - "UtilityFace/resources/**"
      - "UtilityFace/manifest.xml"
      - "UtilityFace/monkey.jungle"
      - "WaveDetector/source/**"
      - "WaveDetector/resources/**"
      - "WaveDetector/manifest.xml"
      - "WaveDetector/monkey.jungle"
      - "StepSync/source/**"
      - "StepSync/resources/**"
      - "StepSync/manifest.xml"
      - "StepSync/monkey.jungle"
      - "arduino/StepSyncReceiver/**"
      - ".github/workflows/release.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Connect IQ SDK Manager CLI
        run: curl -s https://raw.githubusercontent.com/lindell/connect-iq-sdk-manager-cli/master/install.sh | sh

      # Accepts the current Garmin CONNECT IQ SDK License Agreement / Developer
      # Agreement (same one you accept once via the SDK Manager GUI locally).
      # Required non-interactively before the SDK can be downloaded.
      - name: Accept Connect IQ SDK license agreement
        run: connect-iq-sdk-manager agreement accept

      # connect-iq-sdk-manager silently falls back to an interactive OAuth
      # flow (opens a localhost callback server and waits forever) if either
      # credential is missing -- fail fast instead of hanging the runner.
      - name: Verify required secrets are set
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          CIQ_DEVELOPER_KEY_B64: ${{ secrets.CIQ_DEVELOPER_KEY_B64 }}
        run: |
          missing=()
          [ -z "$GARMIN_USERNAME" ] && missing+=(GARMIN_USERNAME)
          [ -z "$GARMIN_PASSWORD" ] && missing+=(GARMIN_PASSWORD)
          [ -z "$CIQ_DEVELOPER_KEY_B64" ] && missing+=(CIQ_DEVELOPER_KEY_B64)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required repo secret(s): ${missing[*]}. Add them under Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi

      - name: Log in to Garmin
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: connect-iq-sdk-manager login

      - name: Install Connect IQ SDK
        run: |
          connect-iq-sdk-manager sdk set 9.2.0
          connect-iq-sdk-manager sdk current-path --bin >> "$GITHUB_PATH"

      # monkeyc needs the target device's definition files, which the SDK
      # doesn't bundle -- these are normally pulled once via the SDK Manager
      # GUI locally (see README Setup), but CI starts from nothing each run.
      - name: Download instinct2 device definition
        run: connect-iq-sdk-manager device download -d instinct2

      - name: Restore developer signing key
        env:
          DEVELOPER_KEY_B64: ${{ secrets.CIQ_DEVELOPER_KEY_B64 }}
        run: echo "$DEVELOPER_KEY_B64" | base64 -d > "$RUNNER_TEMP/developer_key.der"

      # -r strips debug info (Symbols section + embedded source paths) so the
      # published release asset isn't a dev build -- see
      # REVERSE_ENGINEERING_A_PRG.md for what that section contains. All
      # three Connect IQ projects target the same instinct2 device, so the
      # single device-definition download above covers all of them.
      - name: Build A1B2C3D4.PRG (UtilityFace)
        working-directory: UtilityFace
        run: |
          monkeyc -l 3 -w -r -f monkey.jungle -d instinct2 \
            -o A1B2C3D4.PRG \
            -y "$RUNNER_TEMP/developer_key.der"

      - name: Build B2C3D4E5.PRG (WaveDetector)
        working-directory: WaveDetector
        run: |
          monkeyc -l 3 -w -r -f monkey.jungle -d instinct2 \
            -o B2C3D4E5.PRG \
            -y "$RUNNER_TEMP/developer_key.der"

      - name: Build C2D3E4F5.PRG (StepSync)
        working-directory: StepSync
        run: |
          monkeyc -l 3 -w -r -f monkey.jungle -d instinct2 \
            -o C2D3E4F5.PRG \
            -y "$RUNNER_TEMP/developer_key.der"

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Compile StepSync Arduino receiver
        run: |
          arduino-cli core update-index --additional-urls https://downloads.arduino.cc/packages/package_index.json
          arduino-cli core install arduino:renesas_uno --additional-urls https://downloads.arduino.cc/packages/package_index.json
          arduino-cli lib install ArduinoBLE
          arduino-cli compile --fqbn arduino:renesas_uno:unor4wifi \
            --output-dir "$RUNNER_TEMP/arduino-build" \
            arduino/StepSyncReceiver

      - name: Package Arduino build artifact
        run: |
          cd "$RUNNER_TEMP/arduino-build"
          zip -r "$GITHUB_WORKSPACE/StepSyncReceiver-arduino.zip" .

      - name: Compute release tag
        id: tag
        run: echo "tag=v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: UtilityFace ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            UtilityFace/A1B2C3D4.PRG
            WaveDetector/B2C3D4E5.PRG
            StepSync/C2D3E4F5.PRG
            StepSyncReceiver-arduino.zip
